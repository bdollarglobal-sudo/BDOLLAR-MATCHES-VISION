<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDOLLAR MATCHES VISION</title>
    <style>
        /* Base Global Theme */
        body { background-color: #0b0f19; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; scroll-behavior: smooth; }
        
        /* Navigation Styles */
        nav { border-bottom: 1px solid #1f2937; background-color: #111827; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.25rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; color: #22d3ee; margin: 0; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: #9ca3af; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: #22d3ee; }
        .btn-header { background-color: #22d3ee; color: #0b0f19; border: none; font-weight: bold; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; transition: background-color 0.2s; }
        .btn-header:hover { background-color: #06b6d4; }
        .status { background-color: #ef4444; color: white; font-size: 0.75rem; padding: 4px 12px; border-radius: 9999px; font-weight: bold; }

        /* VIEW 1: LANDING PAGE WRAPPER */
        #landing-view { display: block; }
        
        /* Hero Section */
        .hero { text-align: center; padding: 80px 20px; max-width: 800px; margin: 0 auto; }
        .hero h2 { font-size: 2.5rem; font-weight: 800; color: #ffffff; margin-bottom: 15px; }
        .hero p { font-size: 1.1rem; color: #9ca3af; line-height: 1.6; margin-bottom: 30px; }
        .cta-group { display: flex; gap: 15px; justify-content: center; }
        .btn-primary { background-color: #22d3ee; color: #0b0f19; font-weight: bold; padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 1rem; text-transform: uppercase; }
        .btn-secondary { background-color: transparent; border: 1px solid #374151; color: #ffffff; padding: 12px 28px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .btn-primary:hover { background-color: #06b6d4; }
        .btn-secondary:hover { border-color: #9ca3af; }

        /* Grid Framework Metrics */
        .grid-4 { max-width: 1200px; margin: 40px auto; width: 90%; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .metric-card { background-color: #111827; border: 1px solid #1f2937; padding: 25px; border-radius: 12px; text-align: center; }
        .metric-card h3 { font-size: 1.8rem; color: #22d3ee; margin: 0 0 5px 0; }
        .metric-card p { font-size: 0.85rem; color: #6b7280; margin: 0; text-transform: uppercase; font-weight: bold; }

        /* Capabilities & Work Process Sections */
        .section-title { text-align: center; font-size: 1.75rem; font-weight: 700; margin-top: 60px; color: #ffffff; text-transform: uppercase; }
        .grid-3 { max-width: 1200px; margin: 30px auto; width: 90%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .feature-card { background-color: #111827; border: 1px solid #1f2937; padding: 24px; border-radius: 16px; }
        .feature-card h4 { color: #22d3ee; font-size: 1.1rem; margin: 0 0 10px 0; }
        .feature-card p { color: #9ca3af; font-size: 0.9rem; line-height: 1.5; margin: 0; }

        /* Pricing Configuration Grid Cards */
        .pricing-card { background-color: #111827; border: 1px solid #1f2937; padding: 30px; border-radius: 16px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .pricing-card h4 { margin: 0; font-size: 1.25rem; color: #ffffff; }
        .price-tag { font-size: 2.25rem; font-weight: 800; color: #22d3ee; margin: 15px 0; }
        .pricing-features { list-style: none; padding: 0; margin: 0 0 25px 0; text-align: left; }
        .pricing-features li { color: #9ca3af; font-size: 0.9rem; margin-bottom: 10px; }
        .pricing-features li::before { content: "✓ "; color: #34d399; font-weight: bold; margin-right: 5px; }

        /* FAQ Layout Accordion Items */
        .faq-card { background-color: #111827; border: 1px solid #1f2937; padding: 20px; border-radius: 12px; max-width: 800px; margin: 15px auto; width: 90%; }
        .faq-card h5 { margin: 0 0 8px 0; font-size: 1rem; color: #22d3ee; }
        .faq-card p { margin: 0; font-size: 0.9rem; color: #9ca3af; line-height: 1.5; }

        /* Community Footers Links Layout */
        .social-row { display: flex; gap: 20px; justify-content: center; margin: 30px 0 80px 0; }
        .social-link { padding: 10px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .tg { background-color: #0088cc; color: white; }
        .wa { background-color: #25d366; color: white; }
        .tk { background-color: #ffffff; color: black; }

        /* VIEW 2: REAL-TIME SCANNER WRAPPER (HIDDEN BY DEFAULT) */
        #scanner-view { display: none; }
        .controls-container { max-width: 1200px; margin: 20px auto 0 auto; width: 90%; display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .controls-container { grid-template-columns: 1fr 1fr; } }
        .select-box { background-color: #111827; color: white; border: 1px solid #374151; padding: 10px 15px; border-radius: 8px; width: 100%; font-size: 0.9rem; cursor: pointer; outline: none; }
        main { max-width: 1200px; margin: 15px auto; width: 90%; display: grid; grid-template-columns: 1fr; gap: 24px; padding-bottom: 120px; }
        @media (min-width: 1024px) { main { grid-template-columns: 1fr 2fr; } }
        .card { background-color: #111827; padding: 24px; border-radius: 16px; border: 1px solid #1f2937; display: flex; flex-direction: column; justify-content: space-between; height: 360px; box-sizing: border-box; }
        .market-title { font-size: 0.75rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; margin: 0 0 4px 0; }
        .price { font-family: monospace; font-size: 2rem; font-weight: bold; color: #d1d5db; }
        .digit-container { text-align: center; margin: 5px 0; position: relative; }
        .digit-label { font-size: 0.75rem; color: #6b7280; }
        .large-digit { font-family: monospace; font-size: 5rem; font-weight: 900; color: #22d3ee; margin: 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; border-top: 1px solid #1f2937; padding-top: 16px; text-align: center; }
        .stat-name { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; font-weight: bold; }
        .stat-val-1 { font-size: 1.25rem; font-weight: bold; font-family: monospace; color: #34d399; margin-top: 4px; }
        .stat-val-2 { font-size: 1.25rem; font-weight: bold; font-family: monospace; color: #fbbf24; margin-top: 4px; }
        .chart-card { background-color: #111827; padding: 24px; border-radius: 16px; border: 1px solid #1f2937; height: 360px; display: flex; flex-direction: column; box-sizing: border-box; }
        .chart-title { font-size: 0.75rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; margin: 0 0 16px 0; }
        .bar-container { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; height: 100%; padding-bottom: 10px; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
        .bar { width: 65%; background-color: rgba(34, 211, 238, 0.4); border: 2px solid #22d3ee; border-radius: 4px; min-height: 2px; height: 0%; transition: height 0.1s; }
        .bar-label { font-size: 0.85rem; font-weight: bold; color: #9ca3af; margin-top: 8px; font-family: monospace; }
        .alert-panel { max-width: 1200px; margin: 0 auto 20px auto; width: 90%; background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }

        footer { text-align: center; padding: 16px; font-size: 0.75rem; color: #4b5563; background-color: #111827; border-top: 1px solid #1f2937; width: 100%; position: fixed; bottom: 0; left: 0; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- Unified Shared Top Header Navigation -->
    <nav>
        <div class="logo">⚡ BDOLLAR MATCHES VISION</div>
        <div class="nav-links">
            <a href="#features-target" id="link-features">Features</a>
            <a href="#pricing-target" id="link-pricing">Pricing</a>
            <a href="#faq-target" id="link-faq">FAQ</a>
            <button class="btn-header" onclick="activateScannerDashboard()">Access Tool</button>
            <span id="status-badge" class="status" style="display:none;">CONNECTING...</span>
        </div>
    </nav>

    <!-- CONTAINER 1: THE MARKING LANDING PAGE LAYER -->
    <div id="landing-view">
        <section class="hero">
            <h2>Smart Digit Signals for Deriv Traders</h2>
            <p>Matches Vision delivers probability-driven digit insights for Matches and Even / Odd strategies across volatility indices. Built for precision, timing, and clarity.</p>
            <div class="cta-group">
                <button class="btn-primary" onclick="activateScannerDashboard()">Get Access</button>
                <button class="btn-secondary" onclick="document.getElementById('pricing-target').scrollIntoView();">View Pricing</button>
            </div>
        </section>

        <section class="grid-4">
            <div class="metric-card"><h3>High</h3><p>Signal Accuracy</p></div>
