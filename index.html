<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDOLLAR MATCHES VISION</title>
    <style>
        /* Base Global Theme Layout Definitions */
        body { background-color: #050505; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; scroll-behavior: smooth; }
        
        /* Navigation Top Menu Bar Styles */
        nav { background-color: #000000; border-bottom: 1px solid #141414; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-sizing: border-box; width: 100%; }
        .logo { font-size: 1.25rem; font-weight: 700; color: #ffffff; margin: 0; letter-spacing: -0.02em; }
        .nav-links { display: flex; gap: 24px; align-items: center; margin: 0 auto; }
        .nav-links a { color: #a1a1aa; text-decoration: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .nav-links a:hover { color: #ffffff; }
        .btn-header { background-color: #ffffff; color: #000000; border: none; font-weight: 600; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background-color 0.2s; }
        .btn-header:hover { background-color: #e4e4e7; }
        .status-badge { background-color: #ef4444; color: white; font-size: 0.75rem; padding: 4px 12px; border-radius: 9999px; font-weight: bold; display: none; margin-right: 15px; }

        /* CONTAINER 1: SALES PLATFORM LANDING LAYOUTS */
        #landing-view { display: block; padding-bottom: 60px; width: 100%; box-sizing: border-box; }
        .hero { text-align: center; padding: 100px 20px 60px 20px; max-width: 900px; margin: 0 auto; box-sizing: border-box; }
        .hero h2 { font-size: 3.2rem; font-weight: 800; color: #ffffff; margin: 0 0 24px 0; letter-spacing: -0.03em; line-height: 1.15; }
        .hero p { font-size: 1.1rem; color: #71717a; line-height: 1.6; max-width: 680px; margin: 0 auto 40px auto; font-weight: 400; }
        .cta-group { display: flex; gap: 16px; justify-content: center; }
        
        .btn-primary { background-color: #ffffff; color: #000000; font-weight: 600; padding: 14px 32px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.95rem; transition: background-color 0.2s; }
        .btn-secondary { background-color: transparent; border: 1px solid #27272a; color: #ffffff; padding: 14px 32px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: border-color 0.2s; font-weight: 500; }
        .btn-primary:hover { background-color: #e4e4e7; }
        .btn-secondary:hover { border-color: #52525b; }

        /* Row Highlights Grid Structure matching image 1 */
        .grid-4 { max-width: 1240px; margin: 20px auto; width: 95%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; box-sizing: border-box; }
        @media (max-width: 968px) { .grid-4 { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 576px) { .grid-4 { grid-template-columns: 1fr; } }
        
        .metric-card { background-color: #0d1222; border: 1px solid #1a2238; padding: 40px 20px; border-radius: 12px; text-align: center; box-sizing: border-box; }
        .metric-card h3 { font-size: 2.2rem; color: #ffffff; margin: 0 0 8px 0; font-weight: 700; letter-spacing: -0.02em; }
        .metric-card p { font-size: 0.85rem; color: #71717a; margin: 0; font-weight: 500; }

        /* Section Titles and Column Grids matching images 2, 3, & 4 */
        .section-title { text-align: center; font-size: 1.75rem; font-weight: 700; margin: 80px 0 40px 0; color: #ffffff; letter-spacing: -0.02em; }
        .section-subtitle { text-align: center; font-size: 0.95rem; color: #71717a; max-width: 600px; margin: -30px auto 40px auto; line-height: 1.6; }
        
        .grid-3 { max-width: 1240px; margin: 0 auto; width: 95%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; box-sizing: border-box; }
        @media (max-width: 968px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 640px) { .grid-3 { grid-template-columns: 1fr; } }
        
        .feature-card { background-color: #0d1222; border: 1px solid #1a2238; padding: 32px 24px; border-radius: 12px; box-sizing: border-box; text-align: left; }
        .feature-card h4 { color: #ffffff; font-size: 1rem; margin: 0 0 10px 0; font-weight: 600; }
        .feature-card p { color: #71717a; font-size: 0.85rem; line-height: 1.5; margin: 0; font-weight: 400; }
        
        .workflow-card { background-color: #0d1222; border: 1px solid #1a2238; padding: 32px 24px; border-radius: 12px; box-sizing: border-box; text-align: center; }
        .workflow-card h4 { color: #ffffff; font-size: 1rem; margin: 0 0 10px 0; font-weight: 600; }
        .workflow-card p { color: #71717a; font-size: 0.85rem; line-height: 1.5; margin: 0; font-weight: 400; }

        /* Pricing Layout Parameters matching image 4 */
        .grid-pricing { max-width: 1240px; margin: 0 auto; width: 95%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; box-sizing: border-box; }
        @media (max-width: 1024px) { .grid-pricing { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 640px) { .grid-pricing { grid-template-columns: 1fr; } }

        .pricing-card { background-color: #0d1222; border: 1px solid #1a2238; padding: 35px 24px; border-radius: 12px; text-align: left; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; min-height: 420px; }
        .pricing-card h4 { margin: 0 0 8px 0; font-size: 1.15rem; color: #ffffff; font-weight: 600; }
        .pricing-card .desc { font-size: 0.8rem; color: #71717a; margin: 0 0 20px 0; line-height: 1.4; }
        .pricing-card .price-tag { font-size: 2.5rem; font-weight: 800; color: #ffffff; margin: 0 0 24px 0; letter-spacing: -0.02em; }
        .pricing-card ul { list-style: none; padding: 0; margin: 0 0 30px 0; }
        .pricing-card ul li { color: #e4e4e7; font-size: 0.85rem; margin-bottom: 12px; font-weight: 400; display: flex; align-items: center; }
        .pricing-card ul li::before { content: "✓"; color: #ffffff; font-weight: bold; margin-right: 8px; font-size: 0.9rem; }
        .btn-pricing-action { background-color: #ffffff; color: #000000; border: none; font-weight: 600; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; width: 100%; text-align: center; transition: background-color 0.2s; margin-top: auto; }
        .btn-pricing-action:hover { background-color: #e4e4e7; }

        /* FAQ Layout Containers matching image 5 */
        .faq-card { background-color: #0d1222; border: 1px solid #1a2238; padding: 24px 32px; border-radius: 12px; max-width: 860px; margin: 16px auto; width: 95%; box-sizing: border-box; text-align: left; }
        .faq-card h5 { margin: 0 0 8px 0; font-size: 0.95rem; color: #ffffff; font-weight: 600; }
        .faq-card p { margin: 0; font-size: 0.85rem; color: #71717a; line-height: 1.5; font-weight: 400; }

        /* Community Boxes Block Structure matching image 6 precisely */
        .social-row { display: flex; gap: 20px; justify-content: center; max-width: 900px; margin: 0 auto; width: 95%; box-sizing: border-box; }
        @media (max-width: 768px) { .social-row { flex-direction: column; align-items: center; } }
        
        .social-card { background-color: #0d1222; border: 1px solid #1a2238; padding: 20px 30px; border-radius: 12px; display: flex; align-items: center; gap: 16px; width: 260px; box-sizing: border-box; text-decoration: none; text-align: left; transition: border-color 0.2s; }
        .social-card:hover { border-color: #2b3854; }
        .social-card svg { fill: #ffffff; width: 28px; height: 28px; flex-shrink: 0; }
        .social-card .info { display: flex; flex-direction: column; }
        .social-card .info .platform { font-size: 1rem; font-weight: 700; color: #ffffff; margin: 0; }
        .social-card .info .handle { font-size: 0.8rem; color: #71717a; margin: 2px 0 0 0; }

        /* CONTAINER 2: LIVE TRADING SCANNER ENGINE */
        #scanner-view { display: none; width: 100%; box-sizing: border-box; }
        .controls-container { max-width: 1200px; margin: 30px auto 0 auto; width: 90%; display: grid; grid-template-columns: 1fr; gap: 15px; box-sizing: border-box; }
        @media (min-width: 768px) { .controls-container { grid-template-columns: 1fr 1fr; } }
        .select-box { background-color: #090e1a; color: white; border: 1px solid #141b2b; padding: 12px 18px; border-radius: 8px; width: 100%; font-size: 0.9rem; cursor: pointer; outline: none; box-sizing: border-box; }
        .select-box:focus { border-color: #22d3ee; }
        
        main { max-width: 1200px; margin: 20px auto; width: 90%; display: grid; grid-template-columns: 1fr; gap: 24px; padding-bottom: 140px; box-sizing: border-box; }
        @media (min-width: 1024px) { main { grid-template-columns: 1fr 2fr; } }
        
        .card { background-color: #090e1a; padding: 24px; border-radius: 16px; border: 1px solid #141b2b; display: flex; flex-direction: column; justify-content: space-between; height: 360px; box-sizing: border-box; }
        .market-title { font-size: 0.75rem; font-weight: 600; color: #4e5b73; text-transform: uppercase; margin: 0 0 4px 0; }
        .price { font-family: monospace; font-size: 2.2rem; font-weight: bold; color: #ffffff; }
        .digit-container { text-align: center; margin: 5px 0; }
        .digit-label { font-size: 0.75rem; color: #4e5b73; text-transform: uppercase; }
        .large-digit { font-family: monospace; font-size: 5rem; font-weight: 900; color: #22d3ee; margin: 0; }
